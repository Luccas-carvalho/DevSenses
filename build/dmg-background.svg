<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 380" width="540" height="380">
  <defs>
    <linearGradient id="bgDmg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f1840"/>
      <stop offset="55%" stop-color="#100a26"/>
      <stop offset="100%" stop-color="#070414"/>
    </linearGradient>
    <radialGradient id="auroraTop" cx="0.5" cy="0" r="0.7">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auroraBL" cx="0.05" cy="1" r="0.7">
      <stop offset="0%" stop-color="#6d28d9" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="centerGlow" cx="0.5" cy="0.55" r="0.45">
      <stop offset="0%" stop-color="#bd93f9" stop-opacity="0.20"/>
      <stop offset="60%" stop-color="#bd93f9" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#bd93f9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="arrowFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#bd93f9" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#bd93f9" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <!-- Base dark gradient -->
  <rect width="540" height="380" fill="url(#bgDmg)"/>

  <!-- Aurora top + bottom-left -->
  <rect width="540" height="380" fill="url(#auroraTop)"/>
  <rect width="540" height="380" fill="url(#auroraBL)"/>

  <!-- Soft center glow -->
  <circle cx="270" cy="210" r="220" fill="url(#centerGlow)"/>

  <!-- Drag arrow with gradient fade -->
  <g stroke="url(#arrowFade)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <line x1="220" y1="220" x2="320" y2="220"/>
    <polyline points="305,205 320,220 305,235"/>
  </g>

  <!-- Dust particles -->
  <g fill="#bd93f9">
    <circle cx="60"  cy="60"  r="1.6" opacity="0.30"/>
    <circle cx="480" cy="50"  r="1.4" opacity="0.25"/>
    <circle cx="500" cy="320" r="1.6" opacity="0.30"/>
    <circle cx="50"  cy="330" r="1.4" opacity="0.25"/>
    <circle cx="120" cy="100" r="1.0" opacity="0.18"/>
    <circle cx="430" cy="110" r="1.0" opacity="0.18"/>
    <circle cx="100" cy="280" r="1.0" opacity="0.18"/>
    <circle cx="450" cy="270" r="1.0" opacity="0.18"/>
    <circle cx="200" cy="80"  r="0.8" opacity="0.14"/>
    <circle cx="360" cy="320" r="0.8" opacity="0.14"/>
    <circle cx="380" cy="90"  r="0.8" opacity="0.14"/>
    <circle cx="160" cy="310" r="0.8" opacity="0.14"/>
  </g>

  <!-- Title -->
  <text x="270" y="56" text-anchor="middle"
    font-family="-apple-system, SF Pro Display, Helvetica, Arial, sans-serif"
    font-size="24" font-weight="700" fill="#ffffff" letter-spacing="0.3">
    DevSenses
  </text>
  <text x="270" y="80" text-anchor="middle"
    font-family="-apple-system, SF Pro Text, Helvetica, Arial, sans-serif"
    font-size="11" fill="#bcb4dc" letter-spacing="1.4" font-weight="500">
    ARRASTA PRA APPLICATIONS
  </text>
</svg>
