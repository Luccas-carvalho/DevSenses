<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 380" width="540" height="380">
  <defs>
    <linearGradient id="bgDmg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1530"/>
      <stop offset="55%" stop-color="#0f0b22"/>
      <stop offset="100%" stop-color="#080515"/>
    </linearGradient>
    <radialGradient id="glowDmg" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#bd93f9" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#bd93f9" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="540" height="380" fill="url(#bgDmg)"/>
  <!-- soft glow behind icons area -->
  <circle cx="270" cy="220" r="200" fill="url(#glowDmg)"/>
  <!-- arrow hint between icons -->
  <g opacity="0.35" stroke="#bd93f9" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <line x1="220" y1="220" x2="320" y2="220"/>
    <polyline points="305,205 320,220 305,235"/>
  </g>
  <!-- subtle dots / grid -->
  <g fill="#bd93f9" opacity="0.06">
    <circle cx="40" cy="40" r="2"/>
    <circle cx="500" cy="40" r="2"/>
    <circle cx="40" cy="340" r="2"/>
    <circle cx="500" cy="340" r="2"/>
    <circle cx="80" cy="80" r="1.5"/>
    <circle cx="460" cy="80" r="1.5"/>
    <circle cx="80" cy="300" r="1.5"/>
    <circle cx="460" cy="300" r="1.5"/>
  </g>
  <!-- title at top -->
  <text x="270" y="52" text-anchor="middle"
    font-family="-apple-system, SF Pro, Helvetica, Arial, sans-serif"
    font-size="22" font-weight="700" fill="#ffffff">
    DevSenses
  </text>
  <text x="270" y="74" text-anchor="middle"
    font-family="-apple-system, SF Pro, Helvetica, Arial, sans-serif"
    font-size="11" fill="#a8a4c4" letter-spacing="1">
    Arrasta pra Applications pra instalar
  </text>
</svg>
