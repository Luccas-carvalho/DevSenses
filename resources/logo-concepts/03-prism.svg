<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0820"/>
      <stop offset="100%" stop-color="#1a1535"/>
    </linearGradient>
    <linearGradient id="prism3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#bd93f9"/>
      <stop offset="100%" stop-color="#7e3aa9"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg3)"/>
  <!-- white incoming beam -->
  <line x1="60" y1="256" x2="180" y2="256" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
  <!-- prism triangle -->
  <path d="M180 360 L300 152 L420 360 Z" fill="url(#prism3)" stroke="#bd93f9" stroke-width="6" stroke-linejoin="round"/>
  <!-- diff rays out -->
  <line x1="380" y1="200" x2="470" y2="160" stroke="#50fa7b" stroke-width="8" stroke-linecap="round"/>
  <line x1="380" y1="240" x2="470" y2="240" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
  <line x1="380" y1="280" x2="470" y2="320" stroke="#ff5555" stroke-width="8" stroke-linecap="round"/>
  <!-- + and - markers -->
  <text x="450" y="168" font-family="ui-monospace, monospace" font-weight="900" font-size="32" fill="#50fa7b">+</text>
  <text x="448" y="332" font-family="ui-monospace, monospace" font-weight="900" font-size="32" fill="#ff5555">−</text>
</svg>
