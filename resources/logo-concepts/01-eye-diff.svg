<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1530"/>
      <stop offset="100%" stop-color="#0f0b1f"/>
    </linearGradient>
    <linearGradient id="iris1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#bd93f9"/>
      <stop offset="100%" stop-color="#6e3ad9"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg1)"/>
  <!-- eye outline -->
  <path d="M88 256 Q256 112 424 256 Q256 400 88 256 Z" fill="none" stroke="#bd93f9" stroke-width="14" stroke-linejoin="round"/>
  <!-- iris with diff bars inside -->
  <circle cx="256" cy="256" r="90" fill="url(#iris1)"/>
  <circle cx="256" cy="256" r="90" fill="none" stroke="#0f0b1f" stroke-width="6"/>
  <!-- diff bars as pupil -->
  <rect x="226" y="206" width="60" height="14" rx="3" fill="#50fa7b"/>
  <rect x="226" y="226" width="40" height="14" rx="3" fill="#0f0b1f" fill-opacity="0.7"/>
  <rect x="226" y="246" width="60" height="14" rx="3" fill="#0f0b1f" fill-opacity="0.7"/>
  <rect x="226" y="266" width="50" height="14" rx="3" fill="#ff5555"/>
  <rect x="226" y="286" width="60" height="14" rx="3" fill="#0f0b1f" fill-opacity="0.7"/>
  <!-- highlight -->
  <circle cx="290" cy="226" r="14" fill="#fff" fill-opacity="0.3"/>
</svg>
